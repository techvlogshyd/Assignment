name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest + coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: orders_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d orders_test"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 15
    env:
      CI: "true"
      PYTEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/orders_test
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare artifact directory
        working-directory: ${{ github.workspace }}
        run: mkdir -p test-results

      - name: Integration tests (with reruns for flake harness)
        run: >
          python -m pytest tests/
          --junitxml="${{ github.workspace }}/test-results/junit-backend.xml"
          --cov=app
          --cov-report=term-missing
          --cov-report=xml:"${{ github.workspace }}/test-results/coverage.xml"
          --cov-fail-under=48
          --reruns 2
          --reruns-delay 1
          -v --tb=short

      - name: Coverage regression vs baseline
        run: python "${{ github.workspace }}/scripts/check_coverage_vs_baseline.py" "${{ github.workspace }}/test-results/coverage.xml" "${{ github.workspace }}/app/backend/coverage_baseline.txt"

      - name: Flake flag (warn on tests that only passed after rerun)
        if: always()
        run: python "${{ github.workspace }}/scripts/flag_flakes_from_junit.py" "${{ github.workspace }}/test-results"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-artifacts
          path: |
            test-results/junit-backend.xml
            test-results/coverage.xml

  frontend-unit:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install and test
        run: npm ci && npm run test

  integration:
    name: Integration (UI + API + LLM harness; excludes demo failure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start application stack
        run: docker compose -f infra/docker-compose.yml up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health; then echo "API ready"; exit 0; fi
            sleep 2
          done
          echo "API did not become ready"; exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://127.0.0.1:3000/; then echo "UI ready"; exit 0; fi
            sleep 2
          done
          echo "Frontend did not become ready"; exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: automation-framework/requirements.txt

      - name: Install Playwright (Python)
        working-directory: automation-framework
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Playwright (CI excludes intentional red)
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p test-results
          cd automation-framework
          python -m pytest -m "not demo_intentional_fail"
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/playwright-report.json
            test-results/playwright-html
            test-results/playwright-output

  insights-snapshot:
    name: Test insights snapshot (ingest into dashboard SQLite)
    needs: [backend, integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-test-artifacts
          path: test-results
        continue-on-error: true

      - name: Download Playwright artifacts
        uses: actions/download-artifact@v4
        with:
          name: playwright-artifacts
          path: test-results
        continue-on-error: true

      - name: Install dashboard deps
        run: pip install -r automation-framework/dashboard/requirements.txt

      - name: Ingest into dashboard SQLite (proves end-to-end pipeline)
        env:
          ARTIFACTS_ROOT: ${{ github.workspace }}/test-results
          DASHBOARD_DB: ${{ github.workspace }}/test-results/dashboard.sqlite
        run: |
          cd automation-framework/dashboard
          python -c "import main; print(main.ingest_current_artifacts())"

      - name: Upload dashboard snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-snapshot
          path: test-results/dashboard.sqlite
