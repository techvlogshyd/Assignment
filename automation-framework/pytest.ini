# Invoke tests with `python3 -m pytest …` so they run even when the `pytest`
# executable is not on PATH (common after pip install --user).
#
# Layer markers (folder defaults + overrides): ``tests/ui``, ``tests/api``, ``tests/functional``, ``tests/llm``.
[pytest]
testpaths = tests apps
python_files = test_*.py
markers =
    smoke: critical-path checks
    sanity: basic post-deploy checks
    regression: broader suite for release confidence
    demo_intentional_fail: intentional failure for Monday triage demo (exclude in CI)
    ui: Playwright browser flows (page objects under ``apps/*/pages``)
    api: HTTP contract tests (profile ``api_base_url`` / AUTOMATION_API_BASE_URL)
    functional: orchestrated flows spanning layers
    llm_eval: DeepEval metrics — set RUN_LLM_EVAL=1 and see requirements-llm.txt
    customer_order_processing: tenant-specific selection marker
# No -n auto: the Playwright JSON hook in conftest aggregates on the main process only.
addopts =
    -ra
    --reruns 1
    --reruns-delay 1
    --browser chromium
    --tracing retain-on-failure
    --screenshot only-on-failure
    --video retain-on-failure
    --output ../test-results/playwright-output
    --html ../test-results/playwright-html/index.html
    --self-contained-html
    --alluredir ../test-results/allure-results
