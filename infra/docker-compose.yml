services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders_user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://orders_user:orders_pass@postgres:5432/orders_db
      SECRET_KEY: changeme-local-dev-secret
    ports:
      - "8000:8000"
    volumes:
      - ../seed:/seed:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../app/frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
